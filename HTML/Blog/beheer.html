<!DOCTYPE html>
<html lang="nl">
    <head>
        <meta charset="UTF-8">
        <title>Blog beheer</title>
        <link rel="stylesheet" href="../CSS/style.css">
        <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
        <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
        <script src="js/main.js"></script>
    </head>
    <body>
        <h1>Beheer Blogartikelen</h1>

        <form id="nieuw-artikel-form">
            <label for="titel">Titel:</label>
            <input type="text" id="titel" name="titel" required><br><br>

            <label for="datum">Datum:</label>
            <input type="text" id="datum" name="datum"><br><br>
            
            <label for="inhoud">Inhoud:</label>
            <textarea id="inhoud" name="inhoud" required></textarea><br><br>

            <button type="submit">Toevoegen</button>
        </form>

        <div id="melding"></div>
    </body>
</html>
